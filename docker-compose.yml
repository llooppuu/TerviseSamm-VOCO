services:
  db:
    image: mysql:8.0
    container_name: tervisesamm-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vormipaevik}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-secret123}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
