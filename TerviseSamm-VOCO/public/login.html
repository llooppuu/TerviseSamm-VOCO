<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TerviseSamm – Logi sisse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-page">
  <main class="login-layout">
    <section class="login-visual">
      <img src="assets/logo/voco-lockup-white.svg" alt="VOCO logo" class="login-logo" />
      <div class="login-copy">
        <span class="eyebrow">TerviseSamm</span>
        <h1>Vormipäevik, mis toetab arengut.</h1>
        <p>Õpilased näevad oma arengut, õpetajad saavad rühmade koondvaate ja boss-õpetaja haldab ligipääse.</p>
      </div>
      <div class="login-tagline">Õpi end vabaks</div>
    </section>

    <section class="card login-card login-card-themed">
      <div class="section-heading">
        <div>
          <h2>Logi sisse</h2>
          <p class="muted">Kasuta oma kooli kasutajat ja parooli.</p>
        </div>
      </div>

      <form id="loginForm" class="form-grid">
        <label>Kasutajanimi</label>
        <input name="username" autocomplete="username" required />

        <label>Parool</label>
        <input name="password" type="password" autocomplete="current-password" required />

        <button type="submit" class="btn btn-primary btn-full">Logi sisse</button>
        <div id="error" class="error" hidden></div>
      </form>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
